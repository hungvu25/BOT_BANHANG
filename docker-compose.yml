version: "3.9"
services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./apps/server/prisma:/app/apps/server/prisma

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_SERVER_URL: http://localhost:3000/api
    ports:
      - "5173:80"
    depends_on:
      - server
